name: SmoothSSH - SSH AI Assistant TUI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      
      - uses: actions/checkout@v4
      
      - name: Build
        run: go build ./cmd/smoothssh
      
      - name: Test
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      
      - uses: actions/checkout@v4
      
      - name: Lint
        run: |
          go install golang.org/x/lint/golint@latest
          golint ./...
